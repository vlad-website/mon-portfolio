<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== FAVICON ===== -->
    <!-- Основной фавикон -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- Apple Touch Icon (для iPhone/iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Android Chrome -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- ===== META TAGS SEO ===== -->
    <!-- Основные мета-теги -->
    <title>Web-Artisan | Création de sites web pour artisans et commerces en France</title>
    <meta name="description" content="Web-Artisan crée des sites web modernes, élégants et sur-mesure pour les artisans, petits commerces et indépendants en France. Devis gratuit." />
    <meta name="keywords" content="création site web artisan, site vitrine commerce, agence web France, développement site internet, site e-commerce artisan" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Web-Artisan" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://web-artisan.fr/" />
    
    <!-- ===== OPEN GRAPH (Facebook, LinkedIn, etc.) ===== -->
    <meta property="og:title" content="Web-Artisan | Création de sites web pour artisans et commerces" />
    <meta property="og:description" content="Des sites web modernes et sur-mesure pour les artisans, petits commerces et indépendants en France. Je vous accompagne de A à Z." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://web-artisan.fr/" />
    <meta property="og:image" content="https://web-artisan.fr/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Web-Artisan" />
    <meta property="og:locale" content="fr_FR" />
    
    <!-- ===== TWITTER CARDS ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Web-Artisan | Création de sites web pour artisans et commerces" />
    <meta name="twitter:description" content="Des sites web modernes et sur-mesure pour les artisans, petits commerces et indépendants en France." />
    <meta name="twitter:image" content="https://web-artisan.fr/og-image.jpg" />
    
    <!-- ===== STRUCTURED DATA (JSON-LD) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Web-Artisan",
      "description": "Création de sites web sur-mesure pour artisans, commerçants et indépendants en France.",
      "url": "https://web-artisan.fr/",
      "telephone": "+33612345678",
      "email": "contact@web-artisan.fr",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "FR"
      },
      "sameAs": [
        "https://linkedin.com/in/web-artisan",
        "https://github.com/web-artisan"
      ],
      "priceRange": "€€"
    }
    </script>
    
    <!-- Дополнительный structured data для хлебных крошек -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Accueil",
          "item": "https://web-artisan.fr/"
        }
      ]
    }
    </script>

    <title>Web-Artisan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
